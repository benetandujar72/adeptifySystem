<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <filter id="sh2" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <rect width="800" height="480" fill="url(#bg2)" rx="12"/>

  <!-- Top bar -->
  <rect width="800" height="48" fill="#1e293b" rx="12"/>
  <rect width="800" height="8" y="40" fill="#1e293b"/>
  <circle cx="24" cy="24" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="44" cy="24" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="64" cy="24" r="6" fill="#22c55e" opacity="0.8"/>
  <text x="400" y="28" text-anchor="middle" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="2">ADEPTIFY CONSULTOR · PROPOSTA GENERADA</text>

  <!-- Main card -->
  <rect x="16" y="64" width="768" height="402" fill="white" rx="12" filter="url(#sh2)"/>

  <!-- Card header -->
  <rect x="16" y="64" width="768" height="60" fill="#1e293b" rx="12"/>
  <rect x="16" y="100" width="768" height="24" fill="#1e293b"/>

  <!-- Badge -->
  <rect x="32" y="80" width="110" height="24" fill="#6366f1" rx="6"/>
  <text x="87" y="96" text-anchor="middle" font-size="9" fill="white" font-weight="800" letter-spacing="1.5">DIAGNÒSTIC VALIDAT</text>

  <text x="160" y="96" font-size="14" fill="white" font-weight="800">Estratègia de creixement per al vostre centre</text>

  <!-- Ref + date -->
  <text x="650" y="85" font-size="9" fill="#94a3b8" font-weight="600">Ref: ADT-2025-0031</text>
  <text x="650" y="100" font-size="9" fill="#64748b">Data: 24/02/2026</text>

  <!-- Section 01 -->
  <rect x="32" y="140" width="356" height="100" fill="#f8fafc" rx="10" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="32" y="140" width="4" height="100" fill="#6366f1" rx="2"/>
  <text x="48" y="160" font-size="10" fill="#6366f1" font-weight="800" letter-spacing="1.5">01</text>
  <text x="80" y="160" font-size="12" fill="#1e293b" font-weight="800">Resum Executiu</text>
  <text x="48" y="180" font-size="10" fill="#475569" font-weight="500">El centre presenta una sobrecàrrega administrativa</text>
  <text x="48" y="196" font-size="10" fill="#475569">significativa. La proposta inclou automatització de</text>
  <text x="48" y="211" font-size="10" fill="#475569">documents, reducció del 60% del temps en informes</text>
  <text x="48" y="226" font-size="10" fill="#475569">i un sistema de comunicació unificat per a famílies.</text>

  <!-- Section 02 -->
  <rect x="404" y="140" width="364" height="100" fill="#f8fafc" rx="10" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="404" y="140" width="4" height="100" fill="#818cf8" rx="2"/>
  <text x="420" y="160" font-size="10" fill="#818cf8" font-weight="800" letter-spacing="1.5">02</text>
  <text x="452" y="160" font-size="12" fill="#1e293b" font-weight="800">Solució Detallada</text>
  <!-- Bullets -->
  <circle cx="428" cy="178" r="3" fill="#6366f1"/>
  <text x="438" y="182" font-size="10" fill="#475569">Generador automàtic d'actes de reunió (IA)</text>
  <circle cx="428" cy="196" r="3" fill="#6366f1"/>
  <text x="438" y="200" font-size="10" fill="#475569">Portal de comunicació per a famílies</text>
  <circle cx="428" cy="214" r="3" fill="#6366f1"/>
  <text x="438" y="218" font-size="10" fill="#475569">Dashboard de seguiment d'indicadors KPI</text>
  <circle cx="428" cy="232" r="3" fill="#6366f1"/>
  <text x="438" y="236" font-size="10" fill="#475569">Formació in-situ per a l'equip docent</text>

  <!-- Budget table -->
  <rect x="32" y="256" width="496" height="144" fill="#f8fafc" rx="10" stroke="#e2e8f0" stroke-width="1"/>
  <text x="48" y="276" font-size="10" fill="#6366f1" font-weight="800" letter-spacing="1.5">03  ESTRUCTURA D'INVERSIÓ</text>
  <!-- Table header -->
  <rect x="32" y="282" width="496" height="24" fill="#1e293b" rx="4"/>
  <text x="52" y="298" font-size="9" fill="#94a3b8" font-weight="700">CONCEPTE</text>
  <text x="320" y="298" font-size="9" fill="#94a3b8" font-weight="700">HORES</text>
  <text x="400" y="298" font-size="9" fill="#94a3b8" font-weight="700">€/H</text>
  <text x="460" y="298" font-size="9" fill="#94a3b8" font-weight="700">TOTAL</text>
  <!-- Rows -->
  <text x="52" y="318" font-size="10" fill="#1e293b">Automatització documentació</text>
  <text x="328" y="318" font-size="10" fill="#475569" text-anchor="middle">32h</text>
  <text x="408" y="318" font-size="10" fill="#475569" text-anchor="middle">85€</text>
  <text x="488" y="318" font-size="10" fill="#1e293b" font-weight="700" text-anchor="middle">2.720€</text>
  <line x1="44" y1="326" x2="516" y2="326" stroke="#f1f5f9" stroke-width="1"/>
  <text x="52" y="342" font-size="10" fill="#1e293b">Portal famílies + formació</text>
  <text x="328" y="342" font-size="10" fill="#475569" text-anchor="middle">18h</text>
  <text x="408" y="342" font-size="10" fill="#475569" text-anchor="middle">85€</text>
  <text x="488" y="342" font-size="10" fill="#1e293b" font-weight="700" text-anchor="middle">1.530€</text>
  <line x1="44" y1="350" x2="516" y2="350" stroke="#f1f5f9" stroke-width="1"/>
  <text x="52" y="366" font-size="10" fill="#1e293b">Subscripció mensual (SLA)</text>
  <text x="328" y="366" font-size="10" fill="#475569" text-anchor="middle">—</text>
  <text x="408" y="366" font-size="10" fill="#475569" text-anchor="middle">—</text>
  <text x="488" y="366" font-size="10" fill="#1e293b" font-weight="700" text-anchor="middle">290€/mes</text>
  <!-- Total row -->
  <rect x="32" y="380" width="496" height="20" fill="#ede9fe" rx="4"/>
  <text x="52" y="394" font-size="10" fill="#4f46e5" font-weight="800">INVERSIÓ TOTAL ESTIMADA</text>
  <text x="488" y="394" font-size="12" fill="#4f46e5" font-weight="900" text-anchor="middle">4.250€</text>

  <!-- Right panel: totals + actions -->
  <rect x="544" y="256" width="224" height="144" fill="#1e293b" rx="10"/>
  <text x="556" y="278" font-size="9" fill="#94a3b8" font-weight="700" letter-spacing="1.5">ROI ESTIMAT</text>
  <text x="556" y="306" font-size="28" fill="white" font-weight="900">+60%</text>
  <text x="556" y="322" font-size="10" fill="#94a3b8">estalvi de temps</text>

  <line x1="556" y1="336" x2="752" y2="336" stroke="#334155" stroke-width="1"/>

  <text x="556" y="354" font-size="9" fill="#94a3b8" font-weight="700">SUBVENCIÓ NEXTGEN</text>
  <text x="556" y="372" font-size="12" fill="#4ade80" font-weight="800">Fins al 100%</text>

  <!-- CTA buttons -->
  <rect x="32" y="416" width="180" height="38" fill="#6366f1" rx="10"/>
  <text x="122" y="440" text-anchor="middle" font-size="11" fill="white" font-weight="800">Exportar PDF →</text>

  <rect x="224" y="416" width="160" height="38" fill="#f8fafc" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="304" y="440" text-anchor="middle" font-size="11" fill="#475569" font-weight="700">Enviar per correu</text>

  <rect x="396" y="416" width="172" height="38" fill="#f0fdf4" rx="10" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="482" y="440" text-anchor="middle" font-size="11" fill="#15803d" font-weight="700">Contactar consultor</text>
</svg>
