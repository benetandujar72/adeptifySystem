substitutions:
  # Region for Artifact Registry (image storage)
  _AR_REGION: europe-west1
  # Region for Cloud Run (service execution)
  _RUN_REGION: europe-west1
  _SERVICE: adeptify-consultor
  _AR_REPO: adeptify
  # Contact email (SMTP) runtime configuration
  _SMTP_HOST: smtp.gmail.com
  _SMTP_PORT: '587'
  _SMTP_SECURE: 'false'
  _SMTP_USER: bandujar@edutac.es
  _CONTACT_TO: bandujar@edutac.es
  _CONTACT_FROM_NAME: Adeptify Consultor
  # GCS bucket for pre-deploy DB backups (must exist + CB SA needs storage.objects.create)
  _BACKUP_BUCKET: adeptify-supabase-backups

steps:
  # 0) Create .env.production for Vite build (bundle-time)
  # Note: This avoids passing secrets via Dockerfile ARG/ENV.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    secretEnv: ['SUPABASE_URL', 'SUPABASE_ANON_KEY', 'SB_PUBLISHABLE_KEY']
    args:
      - '-c'
      - |
        : > .env.production
        # Vite only exposes variables prefixed with VITE_ to the browser bundle.
        # IMPORTANT: Do NOT put GEMINI_API_KEY into the bundle.
        printf 'VITE_SUPABASE_URL=%s\n' "$$SUPABASE_URL" >> .env.production
        printf 'VITE_SUPABASE_ANON_KEY=%s\n' "$$SUPABASE_ANON_KEY" >> .env.production
        printf 'VITE_SB_PUBLISHABLE_KEY=%s\n' "$$SB_PUBLISHABLE_KEY" >> .env.production

        # Sanity check (do not print secret values)
        sed -E 's/=(.*)$/=*** /' .env.production

  # 0.4) Safety: database backup BEFORE any schema changes
  # Requires:
  #   1) Secret Manager secret: SUPABASE_DB_URL (Postgres connection string, sslmode=require)
  #      Format: postgresql://postgres.[ref]:[password]@aws-0-eu-central-1.pooler.supabase.com:5432/postgres?sslmode=require
  #   2) Cloud Build SA needs roles/secretmanager.secretAccessor on SUPABASE_DB_URL
  #   3) GCS bucket ${_BACKUP_BUCKET} must exist + CB SA needs storage.objects.create
  #
  # Creates a compressed pg_dump (custom format) and uploads it to GCS.
  - name: 'postgres:17'
    entrypoint: 'bash'
    secretEnv: ['SUPABASE_DB_URL']
    args:
      - '-c'
      - |
        set -euo pipefail
        mkdir -p /workspace/db_backups
        BACKUP_FILE="/workspace/db_backups/supabase_${_SERVICE}_${BUILD_ID}.dump.gz"
        echo "Creating Supabase backup: $$BACKUP_FILE (timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ))"
        # Do NOT echo the URL (contains credentials).
        pg_dump "$$SUPABASE_DB_URL" --format=custom | gzip -c > "$$BACKUP_FILE"
        echo "Backup created (bytes): $(wc -c < "$$BACKUP_FILE")"

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        BACKUP_FILE="/workspace/db_backups/supabase_${_SERVICE}_${BUILD_ID}.dump.gz"
        DEST="gs://${_BACKUP_BUCKET}/${_SERVICE}/$(date -u +%Y/%m/%d)/${BUILD_ID}/$(basename "$$BACKUP_FILE")"
        echo "Uploading backup to $$DEST"
        gsutil -q cp "$$BACKUP_FILE" "$$DEST"
        echo "Backup uploaded successfully."

  # 0.5) Apply Supabase DB migrations
  # Runs all SQL files in supabase/migrations/ in alphabetical order (idempotent).
  - name: 'postgres:17'
    entrypoint: 'bash'
    secretEnv: ['SUPABASE_DB_URL']
    args:
      - '-c'
      - |
        set -euo pipefail
        echo "=== Applying Supabase migrations ==="
        for f in $(ls supabase/migrations/*.sql | sort); do
          echo "  → Applying: $$f"
          psql "$$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -1 -f "$$f"
        done
        echo "=== All migrations applied ==="

  # 1) Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker build \
          -t "${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID" \
          -t "${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest" \
          .

  # 2) Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest'

  # 3) Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image'
      - '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID'
      - '--region'
      - '${_RUN_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest,SMTP_PASS=SMTP_PASS:latest'
      - '--set-env-vars'
      - 'SMTP_HOST=${_SMTP_HOST},SMTP_PORT=${_SMTP_PORT},SMTP_SECURE=${_SMTP_SECURE},SMTP_USER=${_SMTP_USER},CONTACT_TO=${_CONTACT_TO},CONTACT_FROM_NAME=${_CONTACT_FROM_NAME}'
      - '--port'
      - '2705'
      - '--quiet'

images:
  - '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID'
  - '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/SUPABASE_URL/versions/latest
      env: 'SUPABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/SUPABASE_ANON_KEY/versions/latest
      env: 'SUPABASE_ANON_KEY'
    - versionName: projects/$PROJECT_ID/secrets/SB_PUBLISHABLE_KEY/versions/latest
      env: 'SB_PUBLISHABLE_KEY'
    - versionName: projects/$PROJECT_ID/secrets/SUPABASE_DB_URL/versions/latest
      env: 'SUPABASE_DB_URL'

