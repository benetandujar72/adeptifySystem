
server {
	listen 8080;
	listen [::]:8080;
	server_name _;

	root /usr/share/nginx/html;
	index index.html;

	location / {
		try_files $uri $uri/ /index.html;
	}

	# Gemini proxy endpoint used by the deployed service worker.
	# Without this, POST requests to /api-proxy/* are treated as static files
	# and Nginx returns 405 (Method Not Allowed).
	location /api-proxy/ {
		proxy_http_version 1.1;
		proxy_ssl_server_name on;
		proxy_set_header Host generativelanguage.googleapis.com;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Host $host;

		proxy_connect_timeout 10s;
		proxy_send_timeout 60s;
		proxy_read_timeout 300s;

		proxy_pass https://generativelanguage.googleapis.com/;
	}

	location = /index.html {
		add_header Cache-Control "no-cache";
	}

	# Runtime config must never be cached.
	location = /env.js {
		add_header Cache-Control "no-cache";
	}

	location = /favicon.ico {
		access_log off;
		log_not_found off;
		return 204;
	}

	location ~* \.(?:js|css|map|png|jpg|jpeg|gif|svg|ico|webp|woff2?|ttf|eot)$ {
		try_files $uri =404;
		expires 1y;
		add_header Cache-Control "public, max-age=31536000, immutable";
	}
}
