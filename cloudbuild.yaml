substitutions:
  # Region for Artifact Registry (image storage)
  _AR_REGION: europe-west1
  # Region for Cloud Run (service execution)
  _RUN_REGION: europe-west1
  _SERVICE: adeptify-consultor
  _AR_REPO: adeptify
  # GCS bucket for automatic Supabase backups (must exist and be accessible by Cloud Build SA)
  _BACKUP_BUCKET: adeptify-supabase-backups

steps:
  # 0) Create .env.production from Secret Manager for Vite build (bundle-time)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    secretEnv: ['GEMINI_API_KEY', 'SUPABASE_URL', 'SUPABASE_ANON_KEY', 'SB_PUBLISHABLE_KEY']
    args:
      - '-c'
      - |
        : > .env.production
        # Vite only exposes variables prefixed with VITE_ to the browser bundle.
        printf 'VITE_GEMINI_API_KEY=%s\n' "$$GEMINI_API_KEY" >> .env.production
        printf 'VITE_SUPABASE_URL=%s\n' "$$SUPABASE_URL" >> .env.production
        printf 'VITE_SUPABASE_ANON_KEY=%s\n' "$$SUPABASE_ANON_KEY" >> .env.production
        printf 'VITE_SB_PUBLISHABLE_KEY=%s\n' "$$SB_PUBLISHABLE_KEY" >> .env.production

        # Sanity check (do not print secret values)
        sed -E 's/=(.*)$/=*** /' .env.production

  # 0.4) Safety: database backup BEFORE any schema changes
  # Produces a compressed pg_dump (custom format) and uploads it to GCS.
  - name: 'postgres:16'
    entrypoint: 'bash'
    secretEnv: ['SUPABASE_DB_URL']
    args:
      - '-c'
      - |
        set -euo pipefail
        mkdir -p /workspace/db_backups
        BACKUP_FILE="/workspace/db_backups/supabase_${_SERVICE}_${BUILD_ID}.dump.gz"
        echo "Creating Supabase backup: $$BACKUP_FILE"
        # Do NOT echo the URL (contains credentials).
        pg_dump "$$SUPABASE_DB_URL" --format=custom | gzip -c > "$$BACKUP_FILE"
        echo "Backup created (bytes): $(wc -c < "$$BACKUP_FILE")"

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        BACKUP_FILE="/workspace/db_backups/supabase_${_SERVICE}_${BUILD_ID}.dump.gz"
        DEST="gs://${_BACKUP_BUCKET}/${_SERVICE}/${BUILD_ID}/$(basename "$$BACKUP_FILE")"
        echo "Uploading backup to $$DEST"
        gsutil -q cp "$$BACKUP_FILE" "$$DEST"
        echo "Backup uploaded."

  # 0.5) Apply Supabase DB schema (non-interactive, idempotent)
  # Requires Secret Manager: SUPABASE_DB_URL (Postgres connection string)
  - name: 'postgres:16'
    entrypoint: 'bash'
    secretEnv: ['SUPABASE_DB_URL']
    args:
      - '-c'
      - |
        set -euo pipefail
        echo "Applying Supabase schema (supabase/production_schema.sql)..."
        # Do not echo the URL (contains credentials).
        # -1 runs the whole file in a single transaction.
        psql "$$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -1 -f supabase/production_schema.sql

  # 1) Build image
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    secretEnv: ['GEMINI_API_KEY', 'SUPABASE_URL', 'SUPABASE_ANON_KEY', 'SB_PUBLISHABLE_KEY']
    args:
      - '-c'
      - |
        docker build \
          --build-arg VITE_GEMINI_API_KEY="$$GEMINI_API_KEY" \
          --build-arg VITE_SUPABASE_URL="$$SUPABASE_URL" \
          --build-arg VITE_SUPABASE_ANON_KEY="$$SUPABASE_ANON_KEY" \
          --build-arg VITE_SB_PUBLISHABLE_KEY="$$SB_PUBLISHABLE_KEY" \
          -t "${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID" \
          -t "${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest" \
          .

  # 2) Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest'

  # 3) Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image'
      - '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID'
      - '--region'
      - '${_RUN_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--quiet'

images:
  - '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID'
  - '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
      env: 'GEMINI_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/SUPABASE_URL/versions/latest
      env: 'SUPABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/SUPABASE_ANON_KEY/versions/latest
      env: 'SUPABASE_ANON_KEY'
    - versionName: projects/$PROJECT_ID/secrets/SB_PUBLISHABLE_KEY/versions/latest
      env: 'SB_PUBLISHABLE_KEY'
    - versionName: projects/$PROJECT_ID/secrets/SUPABASE_DB_URL/versions/latest
      env: 'SUPABASE_DB_URL'
