# ═══════════════════════════════════════════════════════════
# Docker Compose - Stack de Producció Complert
# Campanya Consultoria Digital "Impulsa el teu Negoci Digital"
# ═══════════════════════════════════════════════════════════
# Ús:
#   docker-compose up -d          # Iniciar tot
#   docker-compose logs -f api    # Veure logs API
#   docker-compose down           # Parar tot
# ═══════════════════════════════════════════════════════════

version: "3.9"

services:
  # ── Base de Dades PostgreSQL ──
  db:
    image: postgres:16-alpine
    container_name: campanya-db
    restart: always
    environment:
      POSTGRES_DB: campanya_crm
      POSTGRES_USER: campanya
      POSTGRES_PASSWORD: ${DB_PASSWORD:-CHANGE_ME_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campanya -d campanya_crm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - campanya-net

  # ── Redis (Cache + Broker Celery) ──
  redis:
    image: redis:7-alpine
    container_name: campanya-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-CHANGE_ME_REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-CHANGE_ME_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - campanya-net

  # ── API Backend (FastAPI) ──
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: campanya-api
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://campanya:${DB_PASSWORD:-CHANGE_ME_DB_PASSWORD}@db:5432/campanya_crm
      REDIS_URL: redis://:${REDIS_PASSWORD:-CHANGE_ME_REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-CHANGE_ME_REDIS_PASSWORD}@redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - campanya-net

  # ── Celery Worker (Agents IA + Emails) ──
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.celery
    container_name: campanya-worker
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://campanya:${DB_PASSWORD:-CHANGE_ME_DB_PASSWORD}@db:5432/campanya_crm
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-CHANGE_ME_REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-CHANGE_ME_REDIS_PASSWORD}@redis:6379/2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - campanya-net

  # ── Celery Beat (Scheduler) ──
  beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile.celery
    container_name: campanya-beat
    restart: always
    command: celery -A agents.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-CHANGE_ME_REDIS_PASSWORD}@redis:6379/1
    depends_on:
      - redis
      - worker
    networks:
      - campanya-net

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: campanya-nginx
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ../frontend/dist:/usr/share/nginx/html
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - campanya-net

  # ── Certbot (SSL Let's Encrypt) ──
  certbot:
    image: certbot/certbot
    container_name: campanya-certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - campanya-net

volumes:
  postgres_data:
  redis_data:
  certbot_certs:
  certbot_www:

networks:
  campanya-net:
    driver: bridge
