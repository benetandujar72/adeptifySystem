# ═══════════════════════════════════════════════════════════
# Nginx - Reverse Proxy + Frontend Static
# ═══════════════════════════════════════════════════════════

upstream api_backend {
    server api:8000;
}

# Redirecció HTTP → HTTPS
server {
    listen 80;
    server_name impulsa.edutac.es;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name impulsa.edutac.es;

    # SSL
    ssl_certificate /etc/letsencrypt/live/impulsa.edutac.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/impulsa.edutac.es/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Seguretat headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://generativelanguage.googleapis.com;" always;

    # Compressió
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # API Backend
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting
        limit_req zone=api burst=20 nodelay;
    }

    # Health check
    location /health {
        proxy_pass http://api_backend;
    }

    # Webhook (rate limit separat)
    location /api/v1/webhooks/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        limit_req zone=webhook burst=10 nodelay;
    }

    # Frontend estàtic
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Cache estàtics
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=webhook:10m rate=5r/s;
