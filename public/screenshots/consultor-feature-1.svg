<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0000001a"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bg1)" rx="12"/>

  <!-- Top bar -->
  <rect width="800" height="48" fill="#1e293b" rx="12"/>
  <rect width="800" height="8" y="40" fill="#1e293b"/>
  <circle cx="24" cy="24" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="44" cy="24" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="64" cy="24" r="6" fill="#22c55e" opacity="0.8"/>
  <text x="400" y="28" text-anchor="middle" font-size="11" fill="#94a3b8" font-weight="600" letter-spacing="2">ADEPTIFY CONSULTOR · DIAGNÒSTIC GUIAT</text>

  <!-- Left sidebar -->
  <rect x="16" y="64" width="180" height="402" fill="white" rx="12" filter="url(#shadow)" opacity="0.9"/>
  <text x="32" y="92" font-size="9" fill="#6366f1" font-weight="800" letter-spacing="2">PROGRÉS</text>

  <!-- Steps -->
  <!-- Step 1 active -->
  <circle cx="42" cy="118" r="12" fill="#6366f1"/>
  <text x="42" y="122" text-anchor="middle" font-size="10" fill="white" font-weight="800">1</text>
  <text x="62" y="115" font-size="11" fill="#1e293b" font-weight="700">Situació actual</text>
  <text x="62" y="128" font-size="9" fill="#64748b">Identificant necessitats</text>

  <line x1="42" y1="130" x2="42" y2="155" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="4"/>

  <!-- Step 2 -->
  <circle cx="42" cy="165" r="12" fill="#e0e7ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="42" y="169" text-anchor="middle" font-size="10" fill="#6366f1" font-weight="800">2</text>
  <text x="62" y="162" font-size="11" fill="#64748b" font-weight="600">Prioritats</text>
  <text x="62" y="175" font-size="9" fill="#94a3b8">Impacte i urgència</text>

  <line x1="42" y1="177" x2="42" y2="202" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="4"/>

  <!-- Step 3 -->
  <circle cx="42" cy="212" r="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="42" y="216" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="800">3</text>
  <text x="62" y="209" font-size="11" fill="#94a3b8" font-weight="600">Proposta</text>
  <text x="62" y="222" font-size="9" fill="#cbd5e1">Generació IA</text>

  <line x1="42" y1="224" x2="42" y2="249" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="4"/>

  <!-- Step 4 -->
  <circle cx="42" cy="259" r="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="42" y="263" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="800">4</text>
  <text x="62" y="256" font-size="11" fill="#94a3b8" font-weight="600">Export</text>
  <text x="62" y="269" font-size="9" fill="#cbd5e1">PDF · Email</text>

  <!-- Divider -->
  <line x1="24" y1="295" x2="180" y2="295" stroke="#f1f5f9" stroke-width="1.5"/>

  <!-- Info box -->
  <rect x="24" y="308" width="156" height="56" fill="#f0f9ff" rx="8" stroke="#bae6fd" stroke-width="1"/>
  <text x="36" y="324" font-size="9" fill="#0284c7" font-weight="800" letter-spacing="1.5">TEMPS ESTIMAT</text>
  <text x="36" y="340" font-size="20" fill="#0369a1" font-weight="900">8 min</text>
  <text x="36" y="354" font-size="9" fill="#7dd3fc">Diagnòstic complet</text>

  <!-- Main content area -->
  <rect x="212" y="64" width="572" height="402" fill="white" rx="12" filter="url(#shadow)"/>

  <!-- Chat header -->
  <rect x="212" y="64" width="572" height="56" fill="#1e293b" rx="12"/>
  <rect x="212" y="96" width="572" height="24" fill="#1e293b"/>
  <rect x="228" y="80" width="36" height="36" fill="#6366f1" rx="10"/>
  <text x="246" y="103" text-anchor="middle" font-size="14" fill="white">✦</text>
  <text x="278" y="90" font-size="13" fill="white" font-weight="800">Assistent Adeptify</text>
  <text x="278" y="106" font-size="10" fill="#94a3b8">Diagnòstic intel·ligent · En línia</text>
  <circle cx="760" cy="92" r="6" fill="#22c55e"/>

  <!-- AI message bubble -->
  <rect x="228" y="136" width="380" height="88" fill="#f8fafc" rx="12" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="228" y="136" width="4" height="88" fill="#6366f1" rx="2"/>
  <text x="244" y="156" font-size="11" fill="#1e293b" font-weight="700">Benvingut! Comencem per entendre la seva situació.</text>
  <text x="244" y="174" font-size="10" fill="#64748b">Quina és la principal àrea on el seu equip</text>
  <text x="244" y="189" font-size="10" fill="#64748b">perd més temps durant la setmana?</text>
  <text x="244" y="210" font-size="9" fill="#94a3b8">IA Adeptify · ara mateix</text>

  <!-- Options -->
  <rect x="228" y="236" width="248" height="38" fill="#ede9fe" rx="10" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="352" y="260" text-anchor="middle" font-size="11" fill="#5b21b6" font-weight="700">📋  Reunions i informes</text>

  <rect x="484" y="236" width="220" height="38" fill="#f8fafc" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="594" y="260" text-anchor="middle" font-size="11" fill="#475569" font-weight="600">💬  Comunicació famílies</text>

  <rect x="228" y="282" width="220" height="38" fill="#f8fafc" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="338" y="306" text-anchor="middle" font-size="11" fill="#475569" font-weight="600">📊  Gestió de dades</text>

  <rect x="456" y="282" width="248" height="38" fill="#f8fafc" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="580" y="306" text-anchor="middle" font-size="11" fill="#475569" font-weight="600">🔑  Control d'accessos</text>

  <!-- User reply bubble -->
  <rect x="420" y="334" width="352" height="40" fill="#6366f1" rx="10"/>
  <text x="596" y="359" text-anchor="middle" font-size="11" fill="white" font-weight="600">"Les reunions i la documentació oficial"</text>

  <!-- Input area -->
  <rect x="228" y="392" width="536" height="58" fill="#f8fafc" rx="12" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="248" y="426" font-size="11" fill="#cbd5e1">Continua la conversa aquí...</text>
  <rect x="708" y="404" width="44" height="34" fill="#6366f1" rx="8"/>
  <text x="730" y="426" text-anchor="middle" font-size="16" fill="white">→</text>
</svg>
