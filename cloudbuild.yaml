substitutions:
  # Region for Artifact Registry (image storage)
  _AR_REGION: europe-west1
  # Region for Cloud Run (service execution)
  _RUN_REGION: europe-west1
  _SERVICE: adeptify-consultor
  _AR_REPO: adeptify

steps:
  # 0) Create .env.production from Secret Manager for Vite build (bundle-time)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    secretEnv: ['GEMINI_API_KEY', 'SUPABASE_URL', 'SUPABASE_ANON_KEY', 'SB_PUBLISHABLE_KEY']
    args:
      - '-c'
      - |
        : > .env.production
        printf 'GEMINI_API_KEY=%s\n' "$$GEMINI_API_KEY" >> .env.production
        printf 'SUPABASE_URL=%s\n' "$$SUPABASE_URL" >> .env.production
        printf 'SUPABASE_ANON_KEY=%s\n' "$$SUPABASE_ANON_KEY" >> .env.production
        printf 'SB_PUBLISHABLE_KEY=%s\n' "$$SB_PUBLISHABLE_KEY" >> .env.production

        # Sanity check (do not print secret values)
        sed -E 's/=(.*)$/=*** /' .env.production

  # 1) Build image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID'
      - '-t'
      - '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest'
      - '.'

  # 2) Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest'

  # 3) Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image'
      - '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID'
      - '--region'
      - '${_RUN_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--quiet'

images:
  - '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$BUILD_ID'
  - '${_AR_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
      env: 'GEMINI_API_KEY'
    - versionName: projects/$PROJECT_ID/secrets/SUPABASE_URL/versions/latest
      env: 'SUPABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/SUPABASE_ANON_KEY/versions/latest
      env: 'SUPABASE_ANON_KEY'
    - versionName: projects/$PROJECT_ID/secrets/SB_PUBLISHABLE_KEY/versions/latest
      env: 'SB_PUBLISHABLE_KEY'
